# Merge the model blocks you want into ~/.grok/config.toml.
# Start grok-build-proxy first; it listens on 127.0.0.1:18765 by default.
# If your file already has a [models] table, add this key to that table instead
# of declaring [models] a second time.

[models]
default_reasoning_effort = "xhigh"

[model.codex-sol]
model = "gpt-5.6-sol"
name = "Codex GPT-5.6 Sol"
description = "Latest frontier agentic coding model via ChatGPT Codex"
base_url = "http://127.0.0.1:18765/v1"
api_backend = "responses"
api_key = "unused"
context_window = 372000

[model.codex-terra]
model = "gpt-5.6-terra"
name = "Codex GPT-5.6 Terra"
description = "Balanced agentic coding model via ChatGPT Codex"
base_url = "http://127.0.0.1:18765/v1"
api_backend = "responses"
api_key = "unused"
context_window = 372000

[model.codex-luna]
model = "gpt-5.6-luna"
name = "Codex GPT-5.6 Luna"
description = "Fast agentic coding model via ChatGPT Codex"
base_url = "http://127.0.0.1:18765/v1"
api_backend = "responses"
api_key = "unused"
context_window = 372000

# The -fast suffix is a local proxy alias. It sends the base model with
# service_tier="priority". Availability and usage impact depend on the account.
[model.codex-sol-fast]
model = "gpt-5.6-sol-fast"
name = "Codex GPT-5.6 Sol (Fast)"
base_url = "http://127.0.0.1:18765/v1"
api_backend = "responses"
api_key = "unused"
context_window = 372000


# Built-in Grok model substitution
#
# Start the proxy with the same source=target map used by these overrides:
#
#   GROK_BUILD_PROXY_MODEL_MAP='grok-build=gpt-5.6-terra,grok-composer-2.5=gpt-5.6-terra,grok-4.5=gpt-5.6-sol' \
#     grok-build-proxy
#
# Uncomment only the source IDs present in `grok models`. Quoted table keys are
# required when an ID contains a dot.
#
# [model.grok-build]
# model = "grok-build"
# name = "Grok Build via Codex GPT-5.6 Terra"
# base_url = "http://127.0.0.1:18765/v1"
# api_backend = "responses"
# api_key = "unused"
# context_window = 372000
