name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "release-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (for example 0.0.2)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Resolve version and target
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            target="${GITHUB_SHA}"
            verify_tag=true
          else
            requested="${INPUT_VERSION:-}"
            if [[ -z "${requested}" ]]; then
              requested="$(tr -d '[:space:]' < VERSION)"
            fi
            version="${requested#v}"
            tag="v${version}"
            git fetch origin main
            target="$(git rev-parse origin/main)"
            verify_tag=false
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "verify_tag=${verify_tag}" >> "${GITHUB_OUTPUT}"
      - name: Test
        run: go test -race ./...
      - name: Build macOS release archives
        run: make dist VERSION="${{ steps.version.outputs.version }}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ steps.version.outputs.target }}
          VERIFY_TAG: ${{ steps.version.outputs.verify_tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; nothing to do."
            exit 0
          fi

          args=(
            dist/grok-build-proxy_Darwin_arm64.tar.gz
            dist/grok-build-proxy_Darwin_amd64.tar.gz
            dist/checksums.txt
            --generate-notes
            --latest
            --title "${TAG}"
          )

          if [[ "${VERIFY_TAG}" == "true" ]]; then
            args+=(--verify-tag)
          else
            args+=(--target "${TARGET}")
          fi

          gh release create "${TAG}" "${args[@]}"
      - name: Remove temporary release branch
        if: success() && github.ref_type == 'branch' && startsWith(github.ref_name, 'release-v')
        env:
          BRANCH: ${{ github.ref_name }}
        run: git push origin --delete "${BRANCH}"
