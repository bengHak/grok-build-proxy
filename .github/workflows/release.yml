name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Test
        run: go test -race ./...
      - name: Build macOS release archives
        run: make dist VERSION="${GITHUB_REF_NAME#v}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/grok-build-proxy_Darwin_arm64.tar.gz \
            dist/grok-build-proxy_Darwin_amd64.tar.gz \
            dist/checksums.txt \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
