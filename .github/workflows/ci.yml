name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        shell: bash
        run: |
          set +e
          go test -race ./... 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          if-no-files-found: error
      - name: Validate installer
        run: sh -n install.sh
      - name: Build current Mac architecture
        run: make build VERSION=ci
      - name: Build Apple Silicon and Intel archives
        run: make dist VERSION=ci
